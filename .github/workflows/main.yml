name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE.txt

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet: '8.0.x'
            tfm: 'net8.0'
          - dotnet: '9.0.x'
            tfm: 'net9.0'
          - dotnet: '10.0.x'
            tfm: 'net10.0'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Compile source (${{ matrix.tfm }} + .NETStandard)
        run: |
          dotnet build src/HL7-V2.csproj --configuration Release -f ${{ matrix.tfm }}
          dotnet build src/HL7-V2.csproj --configuration Release -f netstandard2.0

      - name: Run unit tests (${{ matrix.tfm }})
        run: dotnet test test/HL7Test.csproj --configuration Release --logger:trx -f ${{ matrix.tfm }}
        env:
          TEST_TITLE: HL7-V2 unit test

  deploy:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Prepare NuGet package
        run: dotnet pack src/HL7-V2.csproj --configuration Release

      - name: Publish NuGet package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "src/bin/Release/**/*.nupkg" --api-key "$env:NUGET_API_KEY" --source "https://api.nuget.org/v3/index.json"
